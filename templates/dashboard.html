<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tests API — Agify</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
        :root {
            --bg: #0b1020;
            --card: #121a33;
            --muted: #aab4d4;
            --text: #e9edff;
            --accent: #77baff;
            --ok: #62d6a0;
            --warn: #ffcc66;
            --bad: #ff6b7a;
            --line: #23305c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0b1020 0%, #172257 100%);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            color: var(--text);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(119, 186, 255, 0.34);
            background: rgba(119, 186, 255, 0.18);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(119, 186, 255, 0.28);
            border-color: rgba(119, 186, 255, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            border-radius: 16px;
            padding: 16px;
        }

        .card h2 {
            margin: 0 0 12px;
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .card .unit {
            font-size: 12px;
            color: var(--muted);
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .status.ok {
            background: rgba(98, 214, 160, 0.2);
            color: var(--ok);
            border: 1px solid rgba(98, 214, 160, 0.4);
        }

        .status.warn {
            background: rgba(255, 204, 102, 0.2);
            color: var(--warn);
            border: 1px solid rgba(255, 204, 102, 0.4);
        }

        .status.bad {
            background: rgba(255, 107, 122, 0.2);
            color: var(--bad);
            border: 1px solid rgba(255, 107, 122, 0.4);
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
        }

        .chart-container h3 {
            margin: 0 0 16px;
            font-size: 14px;
            color: var(--muted);
        }

        .tests-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tests-table th {
            background: rgba(119, 186, 255, 0.1);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tests-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tests-table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.pass {
            background: rgba(98, 214, 160, 0.2);
            color: var(--ok);
        }

        .badge.fail {
            background: rgba(255, 107, 122, 0.2);
            color: var(--bad);
        }

        .latency-bar {
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--ok), var(--warn), var(--bad));
            margin-top: 4px;
        }

        .history {
            margin-top: 30px;
            padding: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        .history h3 {
            margin: 0 0 16px;
            font-size: 14px;
            color: var(--muted);
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .time {
            color: var(--muted);
        }

        .history-item .result {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .loading {
            text-align: center;
            color: var(--muted);
            padding: 40px 20px;
        }

        .error {
            background: rgba(255, 107, 122, 0.1);
            border: 1px solid rgba(255, 107, 122, 0.3);
            padding: 16px;
            border-radius: 12px;
            color: var(--bad);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🔍 Dashboard Tests API</h1>
                <p style="margin: 4px 0 0; color: var(--muted); font-size: 13px;">
                    Monitoring automatisé de l'API Agify — <span id="last-update">Chargement...</span>
                </p>
            </div>
            <div class="controls">
                <button onclick="runTests()">▶ Exécuter les tests</button>
                <button onclick="location.reload()">🔄 Rafraîchir</button>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="grid" id="kpi-container">
            <div class="loading">⏳ Chargement des données...</div>
        </div>

        <!-- Charts -->
        <div class="charts" id="charts-container"></div>

        <!-- Latest Run Tests Table -->
        <div class="card">
            <h2>Derniers tests exécutés</h2>
            <div id="tests-container">
                <div class="loading">⏳ Chargement des résultats...</div>
            </div>
        </div>

        <!-- History -->
        <div class="history" id="history-container">
            <h3>Historique des 10 derniers runs</h3>
            <div id="history-list">
                <div class="loading">⏳ Chargement...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                // Charger les dernières données
                const response = await fetch('/api/latest');
                if (!response.ok) throw new Error('Impossible de charger les données');

                const data = await response.json();

                // Mettre à jour le timestamp
                const timestamp = new Date(data.timestamp);
                document.getElementById('last-update').textContent =
                    timestamp.toLocaleString('fr-FR', {
                        year: 'numeric', month: 'long', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                // Remplir les KPI
                updateKPIs(data);

                // Remplir la table des tests
                updateTestsTable(data.tests || []);

            } catch (error) {
                console.error('Erreur lors du chargement:', error);
                document.getElementById('kpi-container').innerHTML =
                    '<div class="error">❌ Erreur: ' + error.message + '</div>';
            }

            // Charger l'historique
            try {
                const historyResponse = await fetch('/api/runs');
                if (historyResponse.ok) {
                    const runs = await historyResponse.json();
                    updateHistory(runs);
                }
            } catch (e) {
                console.error('Erreur historique:', e);
            }
        }

        function updateKPIs(data) {
            const summary = data.summary || {};
            const latency = summary.latency_ms || {};
            const status = getStatusClass(data.status || 'UNKNOWN');

            const kpiHTML = `
                <div class="card">
                    <h2>Taux de réussite</h2>
                    <div class="value">${(summary.success_rate || 0).toFixed(1)}%</div>
                    <div class="unit">${summary.passed || 0} / ${summary.total_tests || 0} tests réussis</div>
                </div>

                <div class="card">
                    <h2>Taux d'erreur</h2>
                    <div class="value" style="color: ${data.status === 'OK' ? 'var(--ok)' : 'var(--bad)'}">
                        ${(summary.error_rate || 0).toFixed(1)}%
                    </div>
                    <div class="unit">${summary.failed || 0} tests échoués</div>
                </div>

                <div class="card">
                    <h2>Latence moyenne</h2>
                    <div class="value">${(latency.avg || 0).toFixed(0)}ms</div>
                    <div class="unit">Min: ${(latency.min || 0).toFixed(0)}ms | Max: ${(latency.max || 0).toFixed(0)}ms</div>
                    <div class="unit">P95: ${(latency.p95 || 0).toFixed(0)}ms</div>
                </div>

                <div class="card">
                    <h2>État de santé</h2>
                    <div class="value">${data.status || 'N/A'}</div>
                    <span class="status ${status}">${data.status === 'OK' ? '✓ En bonne santé' :
                        data.status === 'PARTIAL_FAILURE' ? '⚠ Défaillance partielle' : '✗ Défaillance'}</span>
                </div>
            `;

            document.getElementById('kpi-container').innerHTML = kpiHTML;
        }

        function updateTestsTable(tests) {
            if (!tests || tests.length === 0) {
                document.getElementById('tests-container').innerHTML = '<p class="muted">Aucun test exécuté.</p>';
                return;
            }

            const rows = tests.map(test => `
                <tr>
                    <td>
                        <span class="badge ${test.passed ? 'pass' : 'fail'}">
                            ${test.passed ? '✓ PASS' : '✗ FAIL'}
                        </span>
                    </td>
                    <td><strong>${test.name}</strong></td>
                    <td>${test.details || '-'}</td>
                    <td>${test.latency_ms ? test.latency_ms.toFixed(1) + 'ms' : '-'}</td>
                </tr>
            `).join('');

            const table = `
                <table class="tests-table">
                    <thead>
                        <tr>
                            <th>Statut</th>
                            <th>Test</th>
                            <th>Détails</th>
                            <th>Latence</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;

            document.getElementById('tests-container').innerHTML = table;
        }

        function updateHistory(runs) {
            if (!runs || runs.length === 0) {
                document.getElementById('history-list').innerHTML = '<p class="muted">Aucun historique disponible.</p>';
                return;
            }

            const items = runs.map(run => {
                const timestamp = new Date(run.timestamp);
                const timeStr = timestamp.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
                const statusClass = run.success_rate >= 90 ? 'ok' : run.success_rate >= 50 ? 'warn' : 'bad';

                return `
                    <div class="history-item">
                        <span class="time">${timeStr}</span>
                        <div class="result">
                            <span>${run.passed_count}/${run.total_tests} ✓</span>
                            <span style="color: var(--muted); font-size: 11px;">${run.latency_avg_ms.toFixed(0)}ms</span>
                            <span class="badge ${statusClass}" style="font-size: 11px;">
                                ${run.success_rate.toFixed(0)}%
                            </span>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('history-list').innerHTML = items;
        }

        function getStatusClass(status) {
            if (status === 'OK') return 'ok';
            if (status === 'PARTIAL_FAILURE') return 'warn';
            return 'bad';
        }

        async function runTests() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Exécution...';

            try {
                const response = await fetch('/run', { method: 'POST' });
                if (response.ok) {
                    // Attendre 1s et recharger
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                } else {
                    alert('Erreur lors de l\'exécution des tests');
                    btn.disabled = false;
                    btn.textContent = '▶ Exécuter les tests';
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
                btn.disabled = false;
                btn.textContent = '▶ Exécuter les tests';
            }
        }

        // Charger au démarrage et rafraîchir toutes les 30s
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
